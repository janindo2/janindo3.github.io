<!DOCTYPE html>
<html>
<head>
    <title>Hex Code Checker</title>
    <link rel="stylesheet" type="text/css"
          href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<h1>Hex Code Checker</h1>

<p>{{ feedback }}</p>

<form action="/hex_form" method="POST">

    <label>
        Enter a code: #
        <input type="text" name="hex" value="{{ hex }}" required>
    </label>

    <br><br>

    <input type="color" value="#{{ hex }}" disabled>

    <br><br>

    <input type="submit" value="Check Hex Code">

</form>

<br>

<img src="{{ url_for('static', filename='hex_figure.png') }}" alt="Hex Color Graphic">

</body>
</html>
